version: 0.1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
        - aws s3 cp s3://$JS_BUCKET/api/v1/openapi.json ./static/openapi.json
        - pnpm rover graph introspect https://graphql.monei.com/ --output schema.graphql
    build:
      commands:
        - pnpm run genapi:rest
        - pnpm run genapi:graphql
        - pnpm run build
    postBuild:
      commands:
        - aws amplify update-app --app-id $AWS_APP_ID --custom-rules file://redirects.json
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - ~/.local/share/pnpm/store/**/*
